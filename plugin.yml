name: FactionEssentials
main: FactionEssentials\Main
version: 1.0.0
api: 5.0.0
author: ZyberPE

commands:
  sethome:
    usage: "/sethome"
    permission: factionessentials.sethome
  home:
    usage: "/home"
    permission: factionessentials.home
  homes:
    usage: "/homes"
    permission: factionessentials.home
  seehomes:
    usage: "/seehomes <player>"
    permission: factionessentials.admin
  seehome:
    usage: "/seehome <player>"
    permission: factionessentials.admin
  setwarp:
    usage: "/setwarp <name>"
    permission: factionessentials.admin
  warp:
    usage: "/warp <name>"
    permission: factionessentials.warp
  warps:
    usage: "/warps"
    permission: factionessentials.warp
  spawn:
    usage: "/spawn"
    permission: factionessentials.spawn
  setspawn:
    usage: "/setspawn"
    permission: factionessentials.admin
  back:
    usage: "/back"
    permission: factionessentials.back
  break:
    usage: "/break"
    permission: factionessentials.break
  tpall:
    usage: "/tpall"
    permission: factionessentials.admin
  tpa:
    usage: "/tpa <player>"
    permission: factionessentials.tpa
  tpahere:
    usage: "/tpahere <player>"
    permission: factionessentials.tpa
  tpaccept:
    usage: "/tpaccept"
    permission: factionessentials.tpa
  tpdeny:
    usage: "/tpdeny"
    permission: factionessentials.tpa
  top:
    usage: "/top"
    permission: factionessentials.top

permissions:
  factionessentials.admin:
    default: op
  factionessentials.sethome:
    default: true
  factionessentials.home:
    default: true
  factionessentials.warp:
    default: true
  factionessentials.spawn:
    default: true
  factionessentials.back:
    default: true
  factionessentials.break:
    default: true
  factionessentials.tpa:
    default: true
  factionessentials.top:
    default: true
