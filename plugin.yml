name: FactionEssentials
main: FactionEssentials\Main
version: 1.0.0
api: "5.0.0"
author: zyberpe
commands:
  sethome:
    description: Set a home
    usage: "/sethome <name>"
    permission: factionessentials.sethome
  home:
    description: Teleport to a home
    usage: "/home <name>"
    permission: factionessentials.home
  homes:
    description: List your homes
    usage: "/homes"
    permission: factionessentials.homes
  seehomes:
    description: See a player's homes
    usage: "/seehomes <player>"
    permission: factionessentials.seehomes
  seehome:
    description: Teleport to a player's home
    usage: "/seehome <player> <home>"
    permission: factionessentials.seehome
  setwarp:
    description: Set a warp
    usage: "/setwarp <name>"
    permission: factionessentials.setwarp
  warp:
    description: Teleport to a warp
    usage: "/warp <name>"
    permission: factionessentials.warp
  warps:
    description: List all warps
    usage: "/warps"
    permission: factionessentials.warps
  back:
    description: Teleport back to last location
    usage: "/back"
    permission: factionessentials.back
  break:
    description: Break bedrock you are looking at
    usage: "/break"
    permission: factionessentials.break
  tpall:
    description: Teleport all players to you
    usage: "/tpall"
    permission: factionessentials.tpall
  tpa:
    description: Request teleport to a player
    usage: "/tpa <player>"
    permission: factionessentials.tpa
  tpahere:
    description: Request a player to teleport to you
    usage: "/tpahere <player>"
    permission: factionessentials.tpahere
  tpaccept:
    description: Accept teleport request
    usage: "/tpaccept"
    permission: factionessentials.tpaccept
  tpdeny:
    description: Deny teleport request
    usage: "/tpdeny"
    permission: factionessentials.tpdeny
  top:
    description: Teleport on top of the highest block
    usage: "/top"
    permission: factionessentials.top

permissions:
  factionessentials.sethome: true
  factionessentials.home: true
  factionessentials.homes: true
  factionessentials.seehomes: true
  factionessentials.seehome: true
  factionessentials.setwarp: true
  factionessentials.warp: true
  factionessentials.warps: true
  factionessentials.back: true
  factionessentials.break: true
  factionessentials.tpall: true
  factionessentials.tpa: true
  factionessentials.tpahere: true
  factionessentials.tpaccept: true
  factionessentials.tpdeny: true
  factionessentials.top: true
